<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        /* Modern Fonts */
        @import url('https://googleapis.com');

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%);
            margin: 0;
            padding: 0;
            text-align: center;
            color: #4a4a4a;
            overflow-x: hidden;
        }

        header {
            padding: 50px 20px;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 3.5rem;
            color: #ff477e;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            animation: bounce 2s infinite;
        }

        p.subtitle {
            font-size: 1.3rem;
            color: #6c757d;
            margin-top: 0;
        }

        /* Action Button */
        .celebrate-btn {
            background-color: #ff477e;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 71, 126, 0.4);
            transition: transform 0.2s, background-color 0.2s;
        }

        .celebrate-btn:hover {
            transform: scale(1.05);
            background-color: #ff2a63;
        }

        /* Gallery Layout */
        .gallery-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h2 {
            font-family: 'Fredoka One', cursive;
            color: #ff7096;
            font-size: 2rem;
            margin-bottom: 30px;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .photo-card {
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .photo-card:hover {
            transform: translateY(-5px) rotate(2deg);
        }

        .photo-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            background-color: #f0f0f0;
        }

        .photo-caption {
            margin-top: 12px;
            font-weight: 600;
            color: #ff477e;
        }

        /* Pure CSS Balloon Pop-up Elements */
        .balloon {
            position: fixed;
            bottom: -100px;
            width: 40px;
            height: 50px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            z-index: 999;
            animation: floatUp 4s linear forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) rotate(20deg); opacity: 0; }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .photo-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Happy Birthday Chibaa 💜💜! 🎂</h1>
        <p class="subtitle">Wishing you the most magical, amazing day ever!</p>
        
        <!-- Error-free Pure Animation Button -->
        <button class="celebrate-btn" onclick="releaseBalloons()">Click for Magic ✨</button>
    </header>

    <div class="gallery-container">
        <h2>Favorite Memories and Pics 😋 📸</h2>
        <div class="photo-grid">
            
            <div class="photo-card">
                <img src="https://i.ibb.co/QFgTzxJ5/IMG-20260529-WA0024.jpg" alt="Memory 1">
                <div class="photo-caption">Best smile ever! 🥰</div>
            </div>

            <div class="photo-card">
                <img src="https://i.ibb.co/SDS3my77/IMG-20260529-WA0011.jpg" alt="Memory 2">
                <div class="photo-caption">Always you 😂</div>
            </div>

            <div class="photo-card">
                <img src="https://i.ibb.co/HTpstjmG/IMG-20260529-WA0007.jpg" alt="Memory 3">
                <div class="photo-caption">To many more adventures! ✈️</div>
            </div>

        </div>
    </div>

    <script>
        // Simple internal generator that shoots colorful party balloons up the page
        function releaseBalloons() {
            const colors = ['#ff477e', '#ff7096', '#ff85a1', '#ff0055', '#ff9ebb', '#4ae3ff', '#ffdf6d'];
            
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const balloon = document.createElement('div');
                    balloon.className = 'balloon';
                    
                    // Assign random starting coordinates and background highlights
                    balloon.style.left = Math.random() * 100 + 'vw';
                    balloon.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    balloon.style.animationDuration = (Math.random() * 2 + 2) + 's'; 
                    
                    document.body.appendChild(balloon);
                    
                    // Clean up nodes after completion
                    setTimeout(() => balloon.remove(), 4000);
                }, i * 80); // Creates a beautifully spaced waterfall rush effect
            }
        }
    </script>
</body>
</html>
